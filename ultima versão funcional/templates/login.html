<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | The Architectural Ledger</title>
<!-- Google Fonts: Manrope & Inter -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#c6c5d4",
              "inverse-surface": "#2f3038",
              "on-tertiary": "#ffffff",
              "surface-container-low": "#f3f2fe",
              "surface-container-highest": "#e2e1ed",
              "tertiary-fixed-dim": "#ffb865",
              "on-surface": "#1a1b23",
              "on-background": "#1a1b23",
              "on-secondary": "#ffffff",
              "surface-dim": "#dad9e4",
              "on-secondary-fixed": "#00201b",
              "outline": "#767683",
              "surface-container-high": "#e8e7f2",
              "surface": "#fbf8ff",
              "primary-fixed-dim": "#bdc2ff",
              "on-tertiary-fixed-variant": "#663d00",
              "tertiary": "#2a1700",
              "on-tertiary-fixed": "#2b1700",
              "error-container": "#ffdad6",
              "surface-container-lowest": "#ffffff",
              "tertiary-container": "#472900",
              "secondary-container": "#94f0df",
              "primary-fixed": "#e0e0ff",
              "on-primary-fixed-variant": "#343d96",
              "inverse-primary": "#bdc2ff",
              "on-tertiary-container": "#d68500",
              "primary-container": "#1a237e",
              "on-primary-container": "#8690ee",
              "surface-variant": "#e2e1ed",
              "on-primary-fixed": "#000767",
              "tertiary-fixed": "#ffddba",
              "on-secondary-fixed-variant": "#005047",
              "on-error": "#ffffff",
              "on-secondary-container": "#006f62",
              "on-primary": "#ffffff",
              "on-error-container": "#93000a",
              "secondary-fixed": "#97f3e2",
              "surface-container": "#eeedf8",
              "secondary": "#006b5e",
              "error": "#ba1a1a",
              "surface-bright": "#fbf8ff",
              "secondary-fixed-dim": "#7ad7c6",
              "primary": "#000666",
              "inverse-on-surface": "#f1f0fb",
              "on-surface-variant": "#454652",
              "background": "#fbf8ff",
              "surface-tint": "#4c56af"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6">
<!-- Background Blueprint Texture (Abstract) -->
<div class="fixed inset-0 pointer-events-none opacity-5 flex items-center justify-center overflow-hidden">
<div class="w-full h-full border-[20px] border-primary-container grid grid-cols-12 grid-rows-12">
<div class="col-span-12 border-b border-primary-container"></div>
<div class="col-span-12 border-b border-primary-container"></div>
<div class="col-span-12 border-b border-primary-container"></div>
<div class="col-span-12 border-b border-primary-container"></div>
<div class="col-span-1 border-r border-primary-container h-full"></div>
<div class="col-span-1 border-r border-primary-container h-full"></div>
<div class="col-span-1 border-r border-primary-container h-full"></div>
</div>
</div>
<main class="w-full max-w-[480px] relative z-10">
    <div class="text-center mb-10">
        <h1 class="font-headline font-extrabold text-3xl text-primary tracking-tight mb-2">
            Programa de Propostas
        </h1>
        <p class="font-label text-on-surface-variant text-sm tracking-wide uppercase">
            Bem vindo ao Prima Axon System, faça login para começar
        </p>
    </div>
    
    <div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0px_12px_32px_rgba(26,27,35,0.06)] border border-surface-container-high relative overflow-hidden">
        
        <div class="flex justify-center mb-10">
            <div class="bg-surface-container-low px-6 py-3 rounded-lg border-dashed border-2 border-outline-variant/30">
                <span class="font-headline font-bold text-primary-container/40 text-sm italic">
                    [LOGO_DA_EMPRESA]
                </span>
            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-xs font-bold uppercase">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form class="space-y-6" method="POST" action="">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="block font-label text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-widest px-1">
                    Selecione sua Empresa
                </label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]">business</span>
                    <select class="w-full bg-surface-container-high border-none rounded-lg pl-12 pr-4 py-4 text-on-surface font-body text-sm focus:ring-2 focus:ring-primary/40 appearance-none transition-all cursor-pointer" name="company" required>
                        <option disabled="" selected="" value="">Escolha uma organização...</option>
                        <option value="prima_axon">Prima Axon System</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block font-label text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-widest px-1">E-MAIL</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]">mail</span>
                    <input class="w-full bg-surface-container-high border-none rounded-lg pl-12 pr-4 py-4 text-on-surface font-body text-sm focus:ring-2 focus:ring-primary/40 transition-all" 
                           name="username" type="text" placeholder="usuario" required/>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex items-center justify-between px-1">
                    <label class="block font-label text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-widest">SENHA</label>
                    <a class="font-label text-[0.6875rem] font-semibold text-primary-container hover:underline" href="#">Esqueci minha senha</a>
                </div>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]">lock</span>
                    <input class="w-full bg-surface-container-high border-none rounded-lg pl-12 pr-12 py-4 text-on-surface font-body text-sm focus:ring-2 focus:ring-primary/40 transition-all" 
                           name="password" type="password" placeholder="••••••••" required/>
                </div>
            </div>

            <button class="w-full bg-primary text-white font-headline font-bold py-4 rounded-lg shadow-sm hover:bg-primary-container transition-all flex items-center justify-center gap-2 mt-4" type="submit">
                <span>Entrar</span>
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
            </button>
        </form>
    </div> <div class="mt-8 text-center">
        <p class="font-label text-[0.6875rem] text-on-surface-variant font-medium tracking-wide uppercase">
            © 2026 PRIMA AXON SYSTEM
        </p>
    </div>
</main>
<!-- Shared Footer Navigation Suppression as per Hierarchy Rule (Login screen hide standard nav) -->
<!-- The following matches the "Semantic Shell" mandate for suppressed nav on transactional pages -->
</body></html>
